name: Deploy Blazor Client to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'src/Client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cameal-web
  AZURE_WEBAPP_PACKAGE_PATH: './src/Client/Cameal.Client.Web'
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore src/Client/Cameal.Client.Web/Cameal.Client.Web.csproj
      
      - name: Build
        run: dotnet build src/Client/Cameal.Client.Web/Cameal.Client.Web.csproj --configuration Release --no-restore
      
      - name: Publish
        run: dotnet publish src/Client/Cameal.Client.Web/Cameal.Client.Web.csproj --configuration Release --no-build --output ./client-publish
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./client-publish
